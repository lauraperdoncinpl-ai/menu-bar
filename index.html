<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Menù</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Menù del bar - dalla colazione al dopocena">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;
      background: url('sfondo.jpg') no-repeat center center/cover;
    }

    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      animation: fadeIn 1.2s ease;
    }

    /* LOGO */
    .logo {
      width: 140px;
      margin-bottom: 25px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    @media (min-width: 768px) {
      h1 { font-size: 36px; }
    }

    p {
      font-size: 15px;
      color: #ddd;
      margin-bottom: 40px;
    }

    /* BOTTONI BASE */
    .button,
    .instagram-btn {
      display: block;
      margin: 0 auto;
      padding: 16px 30px;
      width: 80%;
      max-width: 280px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: all 0.15s ease;
    }

    /* Bottone menù */
    .button {
      background: linear-gradient(135deg, #d4af37, #b8962e);
      color: black;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Bottone Instagram */
    .instagram-btn {
      margin-top: 15px;
      color: white;
      background: linear-gradient(
        45deg,
        #feda75,
        #fa7e1e,
        #d62976,
        #962fbf,
        #4f5bd5
      );
      background-size: 200% 200%;
    }

    /* HOVER */
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.4);
    }

    .instagram-btn:hover {
      transform: translateY(-2px);
      background-position: right center;
      box-shadow: 0 10px 20px rgba(214,41,118,0.4);
    }

    /* 🔥 FEEDBACK CLICK MOBILE + DESKTOP */
    .button:active,
    .instagram-btn:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    .footer {
      margin-top: 50px;
      font-size: 12px;
      color: #aaa;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

  </style>
</head>

<body>

  <div class="overlay">
    <div class="container">

      <img src="logo.png" alt="Logo" class="logo">

      <h1>Il nostro menù</h1>
      <p>Dalla colazione al dopocena</p>

      <a class="button" href="menu.pdf" target="_blank">
        Scopri il menù
      </a>

      <a class="instagram-btn" href="https://instagram.com/caffe_golin" target="_blank">
        📸 Seguici su Instagram
      </a>

      <div class="footer">
        © 2026 Caffè Golin
      </div>

    </div>
  </div>

</body>
</html>
