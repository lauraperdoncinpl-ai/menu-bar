<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Menù</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Menù del bar - dalla colazione al dopocena">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;
      background: url('sfondo.jpg') no-repeat center center/cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    .container {
      padding: 30px 25px;
      max-width: 420px;
    }

    .logo {
      width: 140px;
      margin-bottom: 25px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    p {
      font-size: 15px;
      color: #ccc;
      margin-bottom: 35px;
    }

    /* BOTTONI MODERNI */
    .button, .instagram-btn {
      display: block;
      margin: 0 auto;
      padding: 15px;
      width: 100%;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: all 0.25s ease;
    }

    /* Menu */
    .button {
      background: #d4af37;
      color: black;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Instagram */
    .instagram-btn {
      margin-top: 12px;
      background: #1a1a1a;
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* HOVER MODERNO */
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.4);
    }

    .instagram-btn:hover {
      background: #262626;
      transform: translateY(-2px);
    }

    .button:active, .instagram-btn:active {
      transform: scale(0.98);
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #888;
    }

  </style>
</head>
<body>

  <div class="overlay">
    <div class="container">

      <img src="logo.png" alt="Logo" class="logo">

      <h1>Il nostro menù</h1>
      <p>Dalla colazione al dopocena</p>

      <a class="button" href="menu.pdf" target="_blank">
        🍽️ Scopri il menù
      </a>

      <a class="instagram-btn" href="https://instagram.com/caffegolin" target="_blank">
        📸 Instagram
      </a>

      <div class="footer">
        © 2026 Il tuo Bar
      </div>

    </div>
  </div>

</body>
</html>
